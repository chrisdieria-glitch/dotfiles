# ENVIAROMENT VARIABLES

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = MOZ_ENABLE_WAYLAND, 1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24

cursor {
    no_hardware_cursors = false
}

###############
### MONITOR ###
###############
monitor=HDMI-A-1,preffered,2560x0,1.25
monitor=eDP-1,preferred,4608x0,1.07
monitor=DP-3,preferred,auto,1.00

workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1

exec-once = hyprctl dispatch workspace 1

#################
### PROGRAMAS ###
#################

$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun
$browser = firefox 

exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = swaync
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#################
### APARIENCIA ###
#################

general {
    gaps_in = 3
    gaps_out = 8,12,12,12
    border_size = 1

    col.active_border = rgb(255,255,255)
    col.inactive_border = rgba(200,200,200,0.8)

    resize_on_border = true
}

decoration {
    rounding = 6

    blur {
        enabled = true
        size = 8
        passes = 2 
    }
}

animations {
    enabled = true
}

################
### INPUT ###
################

input {
    kb_layout = us

    follow_mouse = 1

    touchpad {
        natural_scroll = false
    }

    sensitivity = 0
}

###################
### ATAJOS ###
###################

$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, b, exec, $browser
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, C, killactive
bind = $mainMod, M, exit
bind = $mainMod, f, fullscreen
bind = $mainMod, l, exec, hyprlock
bind = $mainMod, p, exec, ~/.config/hypr/scripts/power.sh
bind = $mainMod, s, exec, ~/.config/hypr/scripts/quick-settings.sh
bind = $mainMod, w, exec, ~/.config/hypr/scripts/wifi-menu.sh
bind = $mainMod SHIFT, w, exec, ~/.config/hypr/scripts/bt-menu.sh
bind = $mainMod SHIFT, b, exec, ~/.config/hypr/scripts/brightness-menu.sh
bind = $mainMod, n, exec, swaync-client -t
# Agrandar
binde = $mainMod CTRL, Right, resizeactive, 50 0
binde = $mainMod CTRL, Left, resizeactive, -50 0
binde = $mainMod CTRL, Up, resizeactive, 0 -50
binde = $mainMod CTRL, Down, resizeactive, 0 50

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

#################
### WORKSPACES ###
#################

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

#################
### RATÓN ###
#################

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#Screenshoot

bind = , PRINT, exec, hyprshot -m region
bind = SUPER, PRINT, exec, hyprshot -m window
bind = SUPER SHIFT, PRINT, exec, hyprshot -m output

#MONITOR CONFIGURATION

bindl=,switch:Lid Switch,exec,hyprctl keyword monitor "eDP-1,disable"
bindl=,switch:off:Lid Switch,exec,hyprctl keyword monitor "eDP-1,preferred,auto,1"
